<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>sshmap — active SSH connections</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050814;
    --bg-deep: #02030a;
    --panel: rgba(10, 20, 40, 0.72);
    --panel-border: rgba(120, 200, 255, 0.12);
    --panel-border-strong: rgba(120, 200, 255, 0.24);
    --ink: #cfe6ff;
    --ink-dim: #7a93b4;
    --ink-faint: #3a4b68;
    --cyan: oklch(0.85 0.15 210);
    --cyan-soft: oklch(0.85 0.15 210 / 0.35);
    --magenta: oklch(0.72 0.24 340);
    --magenta-soft: oklch(0.72 0.24 340 / 0.35);
    --amber: oklch(0.82 0.16 75);
    --green: oklch(0.82 0.18 155);
    --red: oklch(0.68 0.22 25);
    --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
    --sans: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: var(--sans); overflow: hidden; }
  body {
    background:
      radial-gradient(ellipse at 20% 10%, oklch(0.25 0.06 260 / 0.35), transparent 50%),
      radial-gradient(ellipse at 85% 90%, oklch(0.3 0.1 340 / 0.15), transparent 55%),
      var(--bg);
  }
  #root { position: fixed; inset: 0; }
  .chrome-grid {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(var(--panel-border) 1px, transparent 1px),
      linear-gradient(90deg, var(--panel-border) 1px, transparent 1px);
    background-size: 80px 80px;
    opacity: 0.35;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  }
  .scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 50;
    background: repeating-linear-gradient(0deg, rgba(120, 200, 255, 0.02) 0px, rgba(120, 200, 255, 0.02) 1px, transparent 1px, transparent 3px);
    mix-blend-mode: screen;
  }
</style>
</head>
<body>
<div class="chrome-grid"></div>
<div id="root"></div>
<div class="scanlines"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/world-dots.js"></script>
<script type="text/babel" src="src/sessions.js"></script>
<script type="text/babel" src="src/globe.jsx"></script>
<script type="text/babel" src="src/flatmap.jsx"></script>
<script type="text/babel" src="src/panels.jsx"></script>
<script type="text/babel" src="src/tweaks.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
